name: ordersys

x-service-base: &service-base
  build:
    context: .
    dockerfile: Dockerfile
  restart: unless-stopped
  depends_on:
    postgres:
      condition: service_healthy
    rabbitmq:
      condition: service_healthy
    redis:
      condition: service_healthy
  environment: &service-env
    NODE_ENV: development
    LOG_LEVEL: info
    RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    REDIS_URL: redis://redis:6379

services:
  # ---------------- Infrastructure ----------------
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - "5672:5672"   # AMQP
      - "15672:15672" # Management UI (guest/guest)
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ---------------- Application services ----------------
  order-service:
    <<: *service-base
    command: ["sh", "-c", "pnpm --filter @ordersys/order-service run db:push && pnpm dev:order"]
    environment:
      <<: *service-env
      SERVICE_NAME: order-service
      ORDER_PORT: "4001"
      ORDER_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/order_db
      INVENTORY_URL: http://inventory-service:4002
      PAYMENT_URL: http://payment-service:4003
      SHIPPING_URL: http://shipping-service:4004
      NOTIFICATION_URL: http://notification-service:4005
      RABBITMQ_MGMT_URL: http://rabbitmq:15672
    ports:
      - "4001:4001"

  inventory-service:
    <<: *service-base
    command: ["sh", "-c", "pnpm --filter @ordersys/inventory-service run db:push && pnpm dev:inventory"]
    environment:
      <<: *service-env
      SERVICE_NAME: inventory-service
      INVENTORY_PORT: "4002"
      INVENTORY_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/inventory_db
    ports:
      - "4002:4002"

  payment-service:
    <<: *service-base
    command: ["sh", "-c", "pnpm --filter @ordersys/payment-service run db:push && pnpm dev:payment"]
    environment:
      <<: *service-env
      SERVICE_NAME: payment-service
      PAYMENT_PORT: "4003"
      PAYMENT_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/payment_db
    ports:
      - "4003:4003"

  shipping-service:
    <<: *service-base
    command: ["sh", "-c", "pnpm --filter @ordersys/shipping-service run db:push && pnpm dev:shipping"]
    environment:
      <<: *service-env
      SERVICE_NAME: shipping-service
      SHIPPING_PORT: "4004"
      SHIPPING_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/shipping_db
    ports:
      - "4004:4004"

  notification-service:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      LOG_LEVEL: info
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      NOTIFICATION_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/notification_db
      NOTIFICATION_PORT: "4005"
    ports:
      - "4005:4005"

  # ---------------- Dashboard ----------------
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4001
    restart: unless-stopped
    ports:
      - "3000:3000" # ops console at http://localhost:3000
    depends_on:
      - order-service

  # ---------------- Observability ----------------
  prometheus:
    image: prom/prometheus:v2.55.1
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:11.4.0
    ports:
      - "3001:3000" # UI at http://localhost:3001 (admin / admin)
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

volumes:
  pgdata:
