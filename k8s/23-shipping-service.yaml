apiVersion: apps/v1
kind: Deployment
metadata:
  name: shipping-service
  namespace: ordersys
spec:
  replicas: 1
  selector:
    matchLabels: { app: shipping-service }
  template:
    metadata:
      labels: { app: shipping-service }
    spec:
      containers:
        - name: shipping-service
          image: ordersys:latest
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c", "pnpm --filter @ordersys/shipping-service run db:push && pnpm dev:shipping"]
          envFrom:
            - configMapRef: { name: ordersys-config }
          env:
            - name: SERVICE_NAME
              value: shipping-service
            - name: SHIPPING_PORT
              value: "4004"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef: { name: ordersys-secrets, key: POSTGRES_PASSWORD }
            - name: SHIPPING_DATABASE_URL
              value: postgresql://postgres:$(POSTGRES_PASSWORD)@postgres:5432/shipping_db
          ports: [{ containerPort: 4004 }]
          readinessProbe:
            httpGet: { path: /healthz, port: 4004 }
            initialDelaySeconds: 15
            periodSeconds: 5
          resources:
            requests: { cpu: 100m, memory: 160Mi }
            limits: { cpu: 500m, memory: 512Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: shipping-service
  namespace: ordersys
spec:
  selector: { app: shipping-service }
  ports: [{ port: 4004, targetPort: 4004 }]
